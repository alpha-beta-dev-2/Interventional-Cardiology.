<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Interventional Cardiology</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --red: #c0392b;
      --deep-red: #7b0d1e;
      --cream: #fdf6ec;
      --warm-gray: #e8ddd0;
      --charcoal: #1a1a1a;
      --gold: #c9974c;
      --text: #2c2c2c;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--cream);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    /* HERO */
    .hero {
      background: var(--charcoal);
      position: relative;
      overflow: hidden;
      padding: 80px 40px 60px;
      text-align: center;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 60%, rgba(192,57,43,0.35) 0%, transparent 65%),
                  radial-gradient(ellipse at 75% 30%, rgba(123,13,30,0.25) 0%, transparent 60%);
    }

    .hero-eyebrow {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 18px;
      position: relative;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 6vw, 5.5rem);
      font-weight: 900;
      color: #fff;
      line-height: 1.05;
      position: relative;
      margin-bottom: 24px;
    }

    .hero h1 em {
      color: var(--red);
      font-style: italic;
    }

    .hero-sub {
      max-width: 680px;
      margin: 0 auto 40px;
      color: rgba(255,255,255,0.65);
      font-size: 1.05rem;
      line-height: 1.7;
      position: relative;
    }

    /* Animated heartbeat line */
    .heartbeat-wrap {
      position: relative;
      width: 100%;
      max-width: 700px;
      margin: 0 auto;
      height: 60px;
    }

    .heartbeat-wrap svg {
      width: 100%;
      height: 100%;
    }

    .hb-line {
      stroke-dasharray: 1200;
      stroke-dashoffset: 1200;
      animation: drawLine 2.5s ease forwards 0.5s;
    }

    @keyframes drawLine {
      to { stroke-dashoffset: 0; }
    }

    /* STAT STRIP */
    .stats {
      display: flex;
      flex-wrap: wrap;
      background: var(--deep-red);
    }

    .stat {
      flex: 1 1 180px;
      padding: 30px 24px;
      text-align: center;
      border-right: 1px solid rgba(255,255,255,0.1);
    }

    .stat:last-child { border-right: none; }

    .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      font-weight: 900;
      color: #fff;
      display: block;
    }

    .stat-label {
      font-size: 0.75rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      margin-top: 4px;
    }

    /* SECTION LAYOUT */
    .section {
      padding: 70px 40px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--red);
      font-weight: 500;
      margin-bottom: 12px;
    }

    .section h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 3.5vw, 2.8rem);
      font-weight: 700;
      color: var(--charcoal);
      line-height: 1.2;
      margin-bottom: 20px;
    }

    .section p {
      font-size: 1rem;
      line-height: 1.8;
      color: #444;
      max-width: 720px;
    }

    /* DIVIDER */
    .divider {
      height: 2px;
      background: linear-gradient(90deg, var(--red), var(--gold), transparent);
      max-width: 300px;
      margin: 0 0 30px;
    }

    /* WHAT IS IT */
    .what-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
      margin-top: 40px;
    }

    @media (max-width: 700px) {
      .what-grid { grid-template-columns: 1fr; gap: 30px; }
    }

    .heart-diagram {
      position: relative;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .heart-diagram img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .heart-diagram .img-caption {
      position: absolute;
      bottom: 0;
      left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      color: #fff;
      font-size: 0.78rem;
      padding: 20px 16px 12px;
      letter-spacing: 0.5px;
    }

    /* PROCEDURES CARDS */
    .procedures-bg {
      background: var(--charcoal);
      padding: 70px 0;
    }

    .procedures-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 40px;
    }

    .procedures-inner .section-label { color: var(--gold); }
    .procedures-inner h2 { color: #fff; }
    .procedures-inner .divider { background: linear-gradient(90deg, var(--gold), transparent); }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      margin-top: 40px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 28px 24px;
      position: relative;
      overflow: hidden;
      transition: transform 0.3s, background 0.3s;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--red), var(--gold));
    }

    .card:hover {
      transform: translateY(-4px);
      background: rgba(255,255,255,0.08);
    }
